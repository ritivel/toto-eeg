# --------------------------------------------------------------------
# Toto 2.0 — v3 PROBE F (exp26): MP-residual alone + wd=0. 2026-05-06.
#
# Magnitude-preserving residual (Karras et al., EDM2 / SDXL CONFIG D-G):
# replace the u-μP τ-rule split/add (which only normalizes *gradient*
# magnitudes) with `y = (skip + α·residual) / sqrt(1 + α²)`, which
# normalizes *forward* activation magnitudes.  RMS of the residual
# stream becomes bounded regardless of FFN/attention output magnitude
# — the FFN can have small weights intentionally and the trunk RMS
# stays ~constant across depth.
#
# Probe F is identical to Probe C (zerowd) **except** we set
# `model.mp_residual = true` (and `mp_residual_alpha = 1.0`, the
# symmetric SDXL choice).  When `mp_residual=true`, residual_mult
# and residual_attn_ratio are ignored.
#
# Why this might fix the trunk-collapse on its own
# ------------------------------------------------
# In Probe C the trunk RMS *grew* unboundedly because nothing was
# bounding it.  MP-residual gives an explicit, parameter-free upper
# bound (RMS ~ 1 in steady state).  If MP-residual alone yields
# val_loss <= Probe C's 0.1776 *and* trunk weights plateau in a finite
# range, this is the cleanest fix (no extra parameters, no σ overhead).
#
# Companion probes:
#   E = pretrain_eeg_from_scratch_v3_probe_sigmareparam.yaml
#   G = pretrain_eeg_from_scratch_v3_probe_combined.yaml (E + F)
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_pretrained_v3_probe_mpresidual

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0                    # ignored when mp_residual=true
  residual_attn_ratio: 1.0              # ignored when mp_residual=true
  # exp26 manipulation: magnitude-preserving residual.
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 42
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 200
  stable_steps: 5000
  decay_steps: 300
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

trainer:
  max_steps: 5500
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  val_check_interval: 500
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 25
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_pretrain_v3_probe_mpresidual
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_v3_probe_mpresidual_5500steps
  wandb_tags:
    - hbn
    - from_scratch
    - mumbai_h100
    - v3
    - probe
    - mp_residual
    - exp26
    - trajectory
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_pretrain_v3_probe_mpresidual
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_knot_spread_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: -1
  save_last: true
  every_n_train_steps: 500
