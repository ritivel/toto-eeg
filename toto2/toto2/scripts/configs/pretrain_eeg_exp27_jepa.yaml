# --------------------------------------------------------------------
# Toto 2.0 — exp27 PROBE A: hybrid pinball + LeJEPA latent-prediction.
#
# Built on top of exp26 Probe F (mp_residual=true, wd=0, base_lr=0.3)
# which produced the cleanest trunk-bound recipe at val_loss=0.1838.
# This experiment tests whether adding a LeJEPA-style latent-prediction
# head + SIGReg gives the FFN a real job — the v3 trunk-collapse
# post-mortem identified that the pinball-on-asinh-z-score-quantile
# target lets the trunk degenerate to a smart causal-scaler + identity-
# residual + output-head decoder.
#
# Loss = lambda_pinball * L_pinball
#      + lambda_jepa     * ||predictor(context_act_i) - sg(target_act_{i+1})||²
#      + lambda_sigreg   * SIGReg(projected_context_act)
#
# JEPA target encoder is an EMA copy of (scaler + patch_proj + trunk +
# projector); EMA tau=0.999.  Predictor is a 2-layer MLP (256 hidden).
# SIGReg = LeJEPA's Sketched Isotropic Gaussian Regularization with
# Epps-Pulley statistic (vendored in toto2.training.auxiliary_losses).
#
# Decision rule: success = val_pinball stays within 0.01 of 0.1838 AND
# trunk diagnostics improve (val_trunk_eff_rank_ratio >= 0.30 by
# step 5500).
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp27_jepa

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true            # exp26 Probe F recipe
  mp_residual_alpha: 1.0

data:
  context_length: 4096
  train_batch_size: 12         # smaller than Probe F's 16 due to JEPA target-tower memory
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 42
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 200
  stable_steps: 5000
  decay_steps: 300
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  auxiliary:
    jepa:
      enabled: true
      weight: 0.1             # lambda_jepa — small to avoid swamping pinball
      sigreg_weight: 0.01     # lambda_sigreg — LeJEPA-paper-default-scale
      proj_dim: 256
      ema_tau: 0.99           # tighter than 0.999; for 5500-step smokes the
                              # EMA needs to track online faster than the
                              # 1k-step horizon 0.999 implies.
      sigreg_num_slices: 256
      sigreg_n_quad_points: 17

trainer:
  max_steps: 5500
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  val_check_interval: 500
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 25
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_true   # JEPA EMA copy adds unused params

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp27_jepa
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp27_jepa_5500steps
  wandb_tags:
    - hbn
    - mumbai_h100
    - exp27
    - probe_A
    - jepa
    - sigreg
    - mp_residual
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp27_jepa
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_jepa_loss_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: -1
  save_last: true
  every_n_train_steps: 500
