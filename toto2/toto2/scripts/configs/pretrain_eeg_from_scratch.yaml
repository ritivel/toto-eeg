# --------------------------------------------------------------------
# Toto 2.0 — pre-train from scratch on EEG (small reference recipe).
# --------------------------------------------------------------------
# Approximate parameter count for the architecture below: ~22M (matches
# the smallest published Toto 2.0 size that still gets meaningful zero-
# shot performance).  Scale `model.d_model` / `model.num_layers` /
# `data.context_length` to fit your hardware.
# --------------------------------------------------------------------

mode: from_scratch

# Where to dump the final HF-format model (config.json + safetensors).
output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_pretrained

# --------------------------------------------------------------------
# Model architecture (passed to Toto2ModelConfig)
# --------------------------------------------------------------------
# `residual_attn_ratio` is computed automatically from
# (data.context_length / model.patch_size) when omitted.
model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12              # 11 time + 1 variate per group, like Toto 1.0
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 0.75               # Toto 2.0 design note (dd_unit_scaling/README)
  residual_attn_ratio: null         # auto-derived

# --------------------------------------------------------------------
# Data
# --------------------------------------------------------------------
data:
  context_length: 4096              # 64 patches @ patch_size=64
  train_batch_size: 16              # per-rank batch on H100 80GB; 4x DDP -> 64 global
  val_batch_size: 16
  num_workers: 4                    # mp_context=fork avoids DDP-unpickle issues
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  # Builder-specific knobs (consumed by your --dataset-builder)
  # Default points at the .npy mirror produced by convert_npz_to_npy.py;
  # falls back to .npz seamlessly via LazyNpzTimeSeriesDataset's
  # extension-based autodetect.
  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048              # 50% overlap — augments while staying causal
    min_observed_frac: 0.8
    lazy: true                        # required for HBN scale (out-of-RAM)
    cache_size: 2                     # LRU recordings per worker
    # ``windows_per_file`` * num_files = logical dataset length. With ~4k
    # files this gives ~250k windows / epoch → ~3.9k optimizer steps per
    # epoch on 8 H100s × batch 8. Crank up to keep epochs reasonable.
    windows_per_file: 64
    transform:
      type: standardize_per_channel  # see examples/eeg_builder.py

# --------------------------------------------------------------------
# Training (LR, optimizer, schedule)
# --------------------------------------------------------------------
training:
  seed: 42
  optimizer: adamw                  # adamw | normuon | dion2
  base_lr: 5.0e-4
  min_lr: 1.0e-5
  warmup_steps: 2000
  stable_steps: 80000
  decay_steps: 8000
  weight_decay: 0.01
  betas: [0.9, 0.95]
  huber_kappa: 0.0                  # set 0.05 for very noisy / spiky data
  log_grad_norm: true
  compile: true                     # torch.compile (mode=default) -> ~30-50% speedup
  compile_mode: default             # "reduce-overhead" uses CUDA graphs (more memory)
  matmul_precision: high            # TF32 / TC-class matmuls; ~10% on H100
  # world_size_override: 4          # uncomment if Lightning's world_size != DP degree

# --------------------------------------------------------------------
# Lightning Trainer
# --------------------------------------------------------------------
trainer:
  max_steps: 90000                  # = warmup + stable + decay
  accumulate_grad_batches: 1
  precision: bf16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 50
  val_check_interval: 1000          # every 1k optimizer steps
  check_val_every_n_epoch: null     # do NOT bind to epochs; epoch length depends on data
  num_sanity_val_steps: 2
  refresh_rate: 50
  accelerator: gpu
  devices: 4                        # 4 H100s for from-scratch
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_pretrain
  tensorboard: true
  csv: true
  wandb: true                       # WANDB_API_KEY must be set (.env supported)
  wandb_project: toto2-eeg
  wandb_run_name: hbn_from_scratch_22m_optimized
  wandb_tags: [hbn, from_scratch, mumbai_h100, optimized, npy_mmap, compile]
  wandb_log_model: false            # too large to upload at every checkpoint

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_pretrain
  filename: "{epoch}-{step}-{val_loss:.4f}"
  monitor: val_loss
  mode: min
  save_top_k: 3
  save_last: true
  every_n_train_steps: 5000
