# --------------------------------------------------------------------
# Toto 2.0 — exp28 PROBE B: amplitude-aware patch masking (AAMP).
#
# Built on top of exp26 Probe F.  The only manipulation is in
# ``_step``: the cpm_mask passed to the scaler / patch_proj is
# additionally restricted to drop the top-K% amplitude patches per
# (B, V) recording, with K drawn uniformly per-batch in [20, 40]%.
#
# Pinball is still computed on every observed gt position; only the
# scaler statistics and patch-proj input are affected.  The model
# is forced to reconstruct the high-amplitude events (spikes, bursts,
# spindles) instead of memorising the local-interpolation shortcut.
#
# NeurIPT (NeurIPS 2025, arXiv:2510.16548) reports +5.25% TUEV BAC
# from this single change relative to BERT-style random masking.
#
# Decision rule: per-knot pinball spread *increases* (more diversity
# in target = harder task) AND TUAB linear-probe AUROC >=0.01 better
# than Probe F.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp28_aamp

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 42
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 200
  stable_steps: 5000
  decay_steps: 300
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  auxiliary:
    aamp:
      enabled: true
      mask_ratio_range: [0.20, 0.40]   # per-batch K range

trainer:
  max_steps: 5500
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  val_check_interval: 500
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 25
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp28_aamp
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp28_aamp_5500steps
  wandb_tags:
    - hbn
    - mumbai_h100
    - exp28
    - probe_B
    - aamp
    - amplitude_mask
    - mp_residual
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp28_aamp
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_knot_spread_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: -1
  save_last: true
  every_n_train_steps: 500
