# --------------------------------------------------------------------
# Toto 2.0 — v3 PROBE E (exp26): σReparam alone + wd=0. 2026-05-06.
#
# exp25 Probe C (weight_decay=0) was the breakthrough: trunk weights
# *grew* through training (1.0 init -> ~3x by step 5500), val_loss
# 0.1776 (best of any v3 run, 19% below v2.1's 90k-step best of 0.219).
# But Probe C's growth was decelerating, not yet plateaued, raising
# concern about unbounded weight growth over the full 90k schedule.
#
# σReparam (Zhai et al., Apple, ICML 2023) reparametrizes every Linear
# with W_hat = (γ / σ(W)) · W, decoupling the spectral norm of every
# weight matrix from its dimensionality.  Apple's paper shows this lets
# a ViT train *without* warmup, weight decay, or LayerNorm — exactly the
# regimes where v2/v3 trunk-collapse dynamics are weakest.
#
# Probe E is identical to Probe C (zerowd) **except** we set
# `model.sigma_reparam = true`.  Everything else (architecture, LR,
# residual rule, schedule, transform, grad clip, precision) stays
# constant so the manipulation is unambiguous.
#
# Decision rule (per the original exp24 plan):
# - If trunk RMS plateaus at a finite equilibrium (decided by γ) and
#   val_loss matches or beats Probe C's 0.1776 -> σReparam is the right
#   structural fix and we adopt it for the long v3.
# - If val_loss regresses or σ doesn't track γ on wandb, fall back to
#   Probe C's recipe verbatim.
#
# Companion probes:
#   F = pretrain_eeg_from_scratch_v3_probe_mpresidual.yaml
#       — MP-residual alone, also with wd=0
#   G = pretrain_eeg_from_scratch_v3_probe_combined.yaml
#       — σReparam + MP-residual together (the "stack the fixes" run)
# Each is 5500 steps on 4xH100, ~50 min wall-clock.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_pretrained_v3_probe_sigmareparam

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  # exp26 manipulation: σReparam everywhere.  ~5-8% per-step overhead.
  sigma_reparam: true
  mp_residual: false
  mp_residual_alpha: 1.0

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 42
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 200
  stable_steps: 5000
  decay_steps: 300
  weight_decay: 0.0                       # Probe C result: zero is best
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

trainer:
  max_steps: 5500
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  val_check_interval: 500
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 25
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_pretrain_v3_probe_sigmareparam
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_v3_probe_sigmareparam_5500steps
  wandb_tags:
    - hbn
    - from_scratch
    - mumbai_h100
    - v3
    - probe
    - sigma_reparam
    - exp26
    - trajectory
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_pretrain_v3_probe_sigmareparam
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_knot_spread_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: -1
  save_last: true
  every_n_train_steps: 500
