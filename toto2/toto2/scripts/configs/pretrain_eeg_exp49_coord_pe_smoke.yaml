# --------------------------------------------------------------------
# Toto 2.0 — exp49 SMOKE (pre-flight check, ~10 min on 4xH100).
#
# A 500-step variant of pretrain_eeg_exp49_coord_pe.yaml whose ONLY
# purpose is to verify the coord-PE plumbing is healthy on the AWS
# box BEFORE committing GPU-hours to the full 30000-step run.
#
# SUCCESS CRITERIA (record against pre-registered hypotheses)
# -----------------------------------------------------------
# A. ``train_mr_mpl`` and ``val_mr_mpl`` both decreasing through the
#    500-step plateau check (no regression vs. exp46 smoke at the
#    same step count).
# B. ``train_mr_mpl_cos_mean_mean`` grows past 0.3 within 500 steps
#    (matches the exp46-smoke gate; coord-PE should NOT degrade
#    phase coherence).
# C. ``train_mr_mpl_amp_ratio_mean`` stays in [0.3, 2.0].
# D. ``grad_norm`` finite, in [1e-4, 1e1].  Particularly important:
#    coord-PE adds ~64 extra input dims to ``patch_proj``; if σ_B is
#    too high the cosine features will alias and the asinh-saturated
#    output will spike the gradient.  If grad_norm > 1e2 within the
#    first 100 steps, lower ``coord_pe_sigma_B`` to 0.5 and rerun.
# E. NO NaN / Inf in any logged value.
# F. The first batch's keys must include ``electrode_coords`` —
#    confirming the dataset actually emitted coords.  This is logged
#    once at the start of training by the LightningModule's
#    ``_step``-time validation.
# G. Wall-clock < 15 min on 4xH100 SXM5 80GB at precision: 32-true.
#
# IF any of A-G fails, do NOT relaunch the full run.  Investigate per
# the Notion exp49 page's troubleshooting checklist.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp49_coord_pe_smoke

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0
  use_coord_pe: true
  coord_pe_num_fourier: 32
  coord_pe_max_l: 8
  coord_pe_sigma_B: 1.0
  coord_pe_time_scale: 1.0

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none
    electrode_montage: gsn_hydrocel_129

training:
  seed: 51
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 50
  stable_steps: 400
  decay_steps: 50
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  loss_type: mr_mpl
  mr_mpl:
    fft_sizes: [64, 256, 1024]
    hop_sizes: [16, 64,  256]
    win_sizes: null
    alpha_lm: 1.0
    beta_sc:  0.0
    gamma_pc: 1.0
    pinball_calibration_weight: 0.05

trainer:
  max_steps: 500
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  val_check_interval: 100
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 10
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp49_coord_pe_smoke
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp49_coord_pe_smoke_500steps
  wandb_tags:
    - hbn
    - from_scratch
    - mumbai_h100
    - exp49
    - mr_mpl
    - coord_pe
    - fourier_features
    - spherical_harmonics
    - hydrocel_129
    - universal_eeg_1
    - smoke
    - preflight
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp49_coord_pe_smoke
  filename: "{epoch}-{step}-{val_loss:.4f}"
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true
  every_n_train_steps: 250
