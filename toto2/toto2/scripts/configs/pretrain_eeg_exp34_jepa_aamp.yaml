# --------------------------------------------------------------------
# Toto 2.0 — exp34 JEPA + AAMP combined long-horizon run.
#
# Combines the two best probes from the exp27-32 auxiliary suite:
#   * Probe A (exp27 JEPA)  — val_loss=0.182 (winner)
#   * Probe B (exp28 AAMP)  — val_loss=0.198 (borderline; train loss
#                             2× baseline because amplitude-aware
#                             masking makes the task harder)
#
# Empirical support: LuMamba (arXiv:2603.19100) shows that combining
# LeJEPA + masked reconstruction yields complementary benefits —
# reconstruction promotes structured latent spaces, LeJEPA improves
# cross-montage generalization.  AAMP is a strictly stronger version
# of random masking (NeurIPT, arXiv:2510.16548).
#
# Loss = pinball + λ_jepa·jepa + λ_sigreg·sigreg
#        ↑ AAMP modifies the cpm_mask going into the scaler/patch_proj
#        before *any* of these losses are computed (no extra weight)
#
# Hypothesis: AAMP forces the trunk to encode high-amplitude events
# (spikes, bursts, spindles) instead of memorising local-interpolation
# shortcuts; JEPA simultaneously gives the FFN a real job.  The two
# objectives are orthogonal — AAMP touches the *encoder input*,
# JEPA touches the *decoder target* — so they should compose.
#
# Decision rule: success = val_loss ≤ 0.17 by step 30000 AND TUAB
# linear-probe AUROC strictly better than exp27 (JEPA only).
#
# Risk: AAMP overhead is ~2-5% step time on top of JEPA's 4-6%, so
# total throughput should drop from exp33's 1.95 it/s to ~1.7 it/s.
# We compensate with max_steps=30000 (vs exp33's 35000) for the same
# 6-hour wall-clock budget.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp34_jepa_aamp

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0

data:
  context_length: 4096
  train_batch_size: 12         # JEPA target tower memory dominates
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 43                     # different seed from exp33 for paired comparison
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 1000
  stable_steps: 27000
  decay_steps: 2000
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  auxiliary:
    jepa:
      enabled: true
      weight: 0.1
      sigreg_weight: 0.01
      proj_dim: 256
      ema_tau: 0.999
      sigreg_num_slices: 256
      sigreg_n_quad_points: 17
    aamp:
      enabled: true
      mask_ratio_range: [0.20, 0.40]   # exp28 setting

trainer:
  max_steps: 30000
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  val_check_interval: 1000
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 100
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_true   # JEPA EMA copy

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp34_jepa_aamp
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp34_jepa_aamp_30k
  wandb_tags:
    - hbn
    - mumbai_h100
    - exp34
    - long_run
    - jepa
    - aamp
    - combined
    - mp_residual
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp34_jepa_aamp
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_jepa_loss_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: 5
  save_last: true
  every_n_train_steps: 2500
