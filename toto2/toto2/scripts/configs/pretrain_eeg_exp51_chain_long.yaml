# --------------------------------------------------------------------
# Toto 2.0 — exp51_chain_long: CAR + DPSS + MR-MPL @ 80k steps (12h).
#
# Pure scaling experiment, no new ideas.  Stacks the next universal-EEG
# change (DPSS multitaper scaler, #3) on top of the new production
# baseline (CAR, #2).  The pre-registered chain decision from the
# scale01 page promotes ``exp50_long`` (CAR + MR-MPL @ 150k,
# val_pinball=0.155) as the new v4 baseline and chains exp51 on top
# from scratch.
#
# WHAT CHANGES vs. exp50_long
# ---------------------------
# 1. ``model.use_dpss_scaler: true`` -- swap PatchedCausalStdScaler for
#    PatchedCausalDPSSScaler (NW=2.5, K=3, Babadi-Brown 2014 standard).
# 2. ``training.seed: 56`` -- fresh seed (exp48=50, exp49=51, exp50=52,
#    exp51_dpss_only=53, exp48_long2=54, exp50_long_seed55=55).
# 3. Step budget 80k (= ~12h on 4xH100, fits in this session).  Compare
#    against the saved exp50_long checkpoint at step 80k for matched-
#    compute A/B; against exp50_long@150k for compute-extrapolated
#    A/B (with the obvious caveat that exp50_long had ~2x more compute).
#
# WHAT STAYS THE SAME (byte-identical to exp50_long)
# --------------------------------------------------
# Architecture (24M, mp_residual, qk_norm, d_model=384x12), data
# (HBN-EEG ~250k 4096-sample windows @ 500Hz, 129 channels), MR-MPL
# loss (alpha_lm=1.0, beta_sc=0.0, gamma_pc=1.0,
# pinball_calibration=0.05), AdamW base_lr=0.3 wd=0, precision 32-true,
# batch size 16, layer-0 CAR projection, lightning gt_next co-projection.
#
# DECISION RULE (after 80k steps)
# -------------------------------
# A -- DPSS adds value on top of CAR:
#   * val_pinball at step 80k <= exp50_long checkpoint val_pinball at
#     step 80k - 0.005 (exp50_long@80k was around 0.165, so target <= 0.160)
#   * val_trunk_eff_rank_ratio peak >= 0.15 (exp50_long@80k was 0.16)
#   ⇒ Promote.  Run exp51_chain at full 150k after the session.  v4 = CAR + DPSS.
#
# B -- DPSS is a no-op on top of CAR:
#   * val_pinball within ±0.005 of exp50_long at matched compute
#   ⇒ The scaler bias DPSS targets is only relevant for bursty
#     downstream tasks (sleep, seizure).  Run a downstream OEB ridge
#     probe before declaring; cheap to keep DPSS as a clean structural
#     improvement even if HBN-only val_pinball is indifferent.
#
# C -- DPSS hurts:
#   * val_pinball worse than exp50_long by > 0.005 at matched compute
#   ⇒ Multitaper smoothing of the variance is removing useful signal
#     for HBN's relatively clean recordings.  Diagnose via a
#     scaler-output distribution comparison vs exp50_long.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp51_chain_long

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0
  # ---------------- exp50 CAR ----------------
  use_reference_gauge: true
  reference_gauge_method: car
  gauge_augment_std: 0.0
  # ---------------- exp51 DPSS scaler --------
  use_dpss_scaler: true
  dpss_NW: 2.5
  dpss_K: 3

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 56
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 1500
  stable_steps: 74000
  decay_steps: 4500
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  loss_type: mr_mpl
  mr_mpl:
    fft_sizes: [64, 256, 1024]
    hop_sizes: [16, 64,  256]
    win_sizes: null
    alpha_lm: 1.0
    beta_sc:  0.0
    gamma_pc: 1.0
    pinball_calibration_weight: 0.05

trainer:
  max_steps: 80000
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  val_check_interval: 2000
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 100
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp51_chain_long
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp51_chain_long_80k
  wandb_tags:
    - hbn
    - from_scratch
    - mumbai_h100
    - exp51
    - exp51_chain
    - mr_mpl
    - reference_gauge
    - car
    - dpss_scaler
    - slepian
    - multitaper
    - universal_eeg_2_plus_3
    - mp_residual
    - no_aux
    - scaling_12h
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp51_chain_long
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_mr_mpl_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: 5
  save_last: true
  every_n_train_steps: 5000
