# --------------------------------------------------------------------
# Toto 2.0 — exp31 PROBE E: multi-resolution STFT auxiliary loss.
#
# Built on top of exp26 Probe F.  Like exp30 (phase-aware Fourier),
# but instead of one FFT per patch we run three STFTs at different
# resolutions:
#
#   * fft=32 / hop=8     — short window, good for spindles (~12 Hz, 0.5-3 s)
#   * fft=128 / hop=32   — medium window, good for theta/beta
#   * fft=512 / hop=128  — long window, good for alpha rhythm + slow waves
#
# Loss = (1/M) sum_m [spectral_convergence_m + log_magnitude_L1_m].
#
# Following Yamamoto 2019 (Parallel WaveGAN) / Steinmetz auraloss 2020
# / PhysioWave (biosignal).  Weighted at 0.1 so it complements rather
# than dominates pinball.  Operates on the median-knot prediction in
# asinh-scaled space.
#
# Decision rule: val_pinball within 0.01 of 0.1838 AND TUAB linear-probe
# AUROC >=0.01 better than Probe F.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp31_mrstft

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 42
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 200
  stable_steps: 5000
  decay_steps: 300
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  auxiliary:
    mrstft:
      enabled: true
      weight: 0.1
      fft_sizes: [32, 128, 512]
      hop_sizes: [8, 32, 128]

trainer:
  max_steps: 5500
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 25
  val_check_interval: 500
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 25
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp31_mrstft
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp31_mrstft_5500steps
  wandb_tags:
    - hbn
    - mumbai_h100
    - exp31
    - probe_E
    - mrstft
    - spectral
    - mp_residual
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp31_mrstft
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_mrstft_loss_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: -1
  save_last: true
  every_n_train_steps: 500
