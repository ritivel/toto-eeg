# --------------------------------------------------------------------
# Toto 2.0 — exp50: Reference-electrode gauge projection (universal-EEG #2).
#
# Layer-0 Common Average Reference (CAR) projection — the cheapest
# possible expression of "EEG voltages live on R^C / R·1, not R^C".
# Helmholtz reciprocity (1853) makes the +c·1 reference-electrode mode
# physically meaningless; the orthogonal projector
#
#     P = I - (1/C) 11^T
#
# applied per timestep at model layer 0 (before the causal scaler)
# zeroes it out exactly.  Adds zero parameters, costs O(C) per
# timestep, gives a *hard* guarantee of reference-electrode invariance.
#
# This is universal-EEG synthesis #2 — endorsed by R1-S1, R1-S2, R2-A,
# and R2-C of the 8-stream synthesis.  Predicted Δ MDD: +2-5pp +
# structural cross-dataset robustness (different recordings use
# different references; CAR makes that distinction invisible to the
# model).  Risk: very low — the projection is one mean-subtraction
# per timestep with full mask handling, no learnable parameters, no
# data-distribution assumptions.
#
# WHAT CHANGES vs. exp48 (pure MR-MPL @ 60k steps, current best)
# --------------------------------------------------------------
# 1. ``model.use_reference_gauge: true`` — turn on CAR.
# 2. ``model.gauge_augment_std: 0.0`` — augmentation off (it's a
#    no-op against CAR by construction; only useful as a stress-test).
# 3. ``training.seed: 52`` — different roll vs exp48 (50) and exp49 (51).
# 4. Step budget halved (60k -> 30k) for the gate, identical schedule
#    to exp49 so we get a clean A/B vs both exp48 and exp49.
#
# WHAT STAYS THE SAME (byte-identical to exp48)
# ---------------------------------------------
# Architecture (24M, mp_residual, qk_norm, d_model=384x12), data
# (HBN-EEG ~250k 4096-sample windows @ 500Hz, 129 channels), MR-MPL
# loss (alpha_lm=1.0, beta_sc=0.0, gamma_pc=1.0,
# pinball_calibration=0.05), AdamW base_lr=0.3 wd=0, precision 32-true,
# batch size 16.
#
# DECISION RULE (after 30k steps + ridge probe on TUAB)
# -----------------------------------------------------
# Decision A — CAR is a strict improvement; promote to baseline:
#   * val_pinball at step 30k <= exp48 step-30k val_pinball - 0.005
#   * val_trunk_eff_rank_ratio peak >= 0.20 (exp48 had 0.244)
#   * val_mr_mpl_cos_mean (final) >= 0.93 (exp48 had 0.943)
#   * Cross-dataset OEB ridge AUROC >= exp48 + 0.01 on >= 4 of 8 benchmarks
#   ⇒ Promote CAR.  Run exp50b at 60k steps + chain into exp51 (DPSS scaler).
#
# Decision B — CAR is a no-op:
#   * val_pinball within ±0.005 of exp48 at matched compute
#   ⇒ The variate attention was already implicitly absorbing the +c·1
#     mode into ``loc`` via the causal scaler.  Note: still potentially
#     useful for cross-dataset robustness (CAR guarantees out-of-
#     distribution reference electrodes don't break the model);
#     ridge-probe the checkpoint to test downstream transfer.
#
# Decision C — CAR hurts:
#   * val_pinball worse than exp48 by > 0.005 at matched compute
#   ⇒ Mean subtraction is removing genuinely useful information
#     (extremely unlikely on physical grounds, but possible if our
#     CAR mask handling has a numerical bug — diagnose via the
#     gauge-augmentation stress test in the smoke).
#
# WALL-CLOCK on 4xH100 SXM5 80GB at precision: 32-true
# ----------------------------------------------------
# ~4.4 hours for 30000 steps at the steady-state 1.88 it/s observed
# in exp49.  CAR is one mean subtraction per timestep — completely
# negligible vs. the 12-layer transformer + MR-MPL STFTs.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp50_rest_car

# --------------------------------------------------------------------
# Model — exp48 architecture + CAR projection at layer 0
# --------------------------------------------------------------------
model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0
  # ---------------- exp50 CAR ----------------
  use_reference_gauge: true
  reference_gauge_method: car
  gauge_augment_std: 0.0          # off; CAR makes it a no-op anyway

# --------------------------------------------------------------------
# Data — HBN-EEG identical to exp48
# --------------------------------------------------------------------
data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

# --------------------------------------------------------------------
# Training — exp48 recipe rebased to 30k steps for the gate
# --------------------------------------------------------------------
training:
  seed: 52                              # different from exp48=50, exp49=51
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 1000
  stable_steps: 27000
  decay_steps: 2000
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  loss_type: mr_mpl
  mr_mpl:
    fft_sizes: [64, 256, 1024]
    hop_sizes: [16, 64,  256]
    win_sizes: null
    alpha_lm: 1.0
    beta_sc:  0.0
    gamma_pc: 1.0
    pinball_calibration_weight: 0.05

trainer:
  max_steps: 30000
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  val_check_interval: 1500
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 100
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp50_rest_car
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp50_rest_car_30k
  wandb_tags:
    - hbn
    - from_scratch
    - mumbai_h100
    - exp50
    - mr_mpl
    - reference_gauge
    - car
    - common_average_reference
    - helmholtz_reciprocity
    - universal_eeg_2
    - mp_residual
    - no_aux
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp50_rest_car
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_mr_mpl_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: 5
  save_last: true
  every_n_train_steps: 1500
