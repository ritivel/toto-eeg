# --------------------------------------------------------------------
# Toto 2.0 — exp50_long_seed55: reproducibility check on yesterday's SOTA.
#
# Pure scaling experiment, no new ideas.  Yesterday's exp50_long (seed=53,
# 150k steps) reached val_pinball=0.155.  This run is the same recipe
# at seed=55 to confirm the SOTA result is seed-stable rather than a
# lucky roll.
#
# Step budget shortened to 80k (~12h on 4xH100, fits in this session).
# A converged 80k checkpoint of exp50_long should be available for
# direct matched-compute A/B vs this run -- both at 80k means same
# WSD-stable phase, same total compute, same recipe, different seed.
# --------------------------------------------------------------------

mode: from_scratch

output_dir: /opt/dlami/nvme/eeg/runs/toto2_eeg_exp50_long_seed55

model:
  patch_size: 64
  d_model: 384
  num_heads: 6
  num_layers: 12
  layer_group_size: 12
  num_variate_layers_per_group: 1
  variate_layer_first: false
  num_output_patches: 1
  qk_norm: true
  norm_include_weight: false
  per_dim_scale: false
  use_xpos: false
  residual_mult: 1.0
  residual_attn_ratio: 1.0
  sigma_reparam: false
  mp_residual: true
  mp_residual_alpha: 1.0
  use_reference_gauge: true
  reference_gauge_method: car
  gauge_augment_std: 0.0

data:
  context_length: 4096
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  multiprocessing_context: fork
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  drop_last: true

  eeg:
    data_root: /opt/dlami/nvme/eeg/npy
    train_glob: "sub-*/task-*.npy"
    val_glob: null
    val_fraction: 0.05
    array_key: data
    sfreq: 500
    expected_channels: 129
    sliding_stride: 2048
    min_observed_frac: 0.8
    lazy: true
    cache_size: 2
    windows_per_file: 64
    transform:
      type: none

training:
  seed: 55                              # vs exp50_long=53
  optimizer: adamw
  base_lr: 0.3
  min_lr: 1.5e-2
  warmup_steps: 1500
  stable_steps: 74000
  decay_steps: 4500
  weight_decay: 0.0
  betas: [0.9, 0.95]
  huber_kappa: 0.05
  log_grad_norm: true
  compile: false
  matmul_precision: high

  loss_type: mr_mpl
  mr_mpl:
    fft_sizes: [64, 256, 1024]
    hop_sizes: [16, 64,  256]
    win_sizes: null
    alpha_lm: 1.0
    beta_sc:  0.0
    gamma_pc: 1.0
    pinball_calibration_weight: 0.05

trainer:
  max_steps: 80000
  accumulate_grad_batches: 1
  precision: 32-true
  gradient_clip_val: 1.0
  log_every_n_steps: 100
  val_check_interval: 2000
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  refresh_rate: 100
  accelerator: gpu
  devices: 4
  strategy: ddp_find_unused_parameters_false

logging:
  save_dir: /opt/dlami/nvme/eeg/runs/lightning_logs
  name: toto2_eeg_exp50_long_seed55
  tensorboard: true
  csv: true
  wandb: true
  wandb_project: toto2-eeg
  wandb_run_name: hbn_exp50_long_seed55_80k
  wandb_tags:
    - hbn
    - from_scratch
    - mumbai_h100
    - exp50
    - exp50_seed55
    - mr_mpl
    - reference_gauge
    - car
    - reproducibility
    - mp_residual
    - no_aux
    - scaling_12h
  wandb_log_model: false

checkpoint:
  dirpath: /opt/dlami/nvme/eeg/runs/checkpoints/toto2_eeg_exp50_long_seed55
  filename: "{epoch}-{step}-{val_loss:.4f}-{train_mr_mpl_step:.3e}"
  monitor: val_loss
  mode: min
  save_top_k: 3
  save_last: true
  every_n_train_steps: 5000
